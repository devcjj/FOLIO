# Pulse - Morning News Digest Bot
# Fetches: top headlines from BBC News, The Hindu, and The Guardian
# Sends:   formatted HTML email every morning
# Runs:    every day at 7:00 AM IST (1:30 AM UTC) via GitHub Actions

name: Pulse - Morning News Digest

on:
  schedule:
    # 1:30 AM UTC = 7:00 AM IST
    - cron: '30 1 * * *'
  
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  run-news-digest:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v6

      # Step 2: Setup Python
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run the news digest bot
      - name: Run News Digest Bot
        run: python news_bot.py
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}

      # Step 5: Save news_digest.html as a workflow artifact
      - name: Upload digest as artifact
        uses: actions/upload-artifact@v7
        with:
          name: news-digest
          path: news_digest.html
