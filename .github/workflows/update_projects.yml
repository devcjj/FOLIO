# Pulse - Portfolio Projects Auto-Updater
# Fetches latest GitHub repositories, updates index.html and projects.json,
# and automatically commits/pushes changes back to the repository.
# Runs on: every push to main branch

name: Pulse - Auto-Update Portfolio Projects

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write # Needed to commit and push changes back to the repo

jobs:
  update-portfolio:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Fetch all history so git diff can check changes accurately
          fetch-depth: 0

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run the projects updater script
      - name: Run update script
        run: python update_projects.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 5: Commit and push changes back to the repo (if any)
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html projects.json
          # Commit and push only if there are modified files
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update projects list from GitHub API" && git push)
